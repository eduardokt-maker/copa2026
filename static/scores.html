<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Placares | Copa 2026</title>
    <link rel="stylesheet" href="/styles.css?v=20260623-classificacao-grupo" />
  </head>
  <body class="scores-pro-page">
    <header class="score-app-header">
      <a class="score-brand" href="/">
        <span class="score-brand-mark">26</span>
        <span>
          <strong>Copa 2026</strong>
          <small>World Cup Scores</small>
        </span>
      </a>
      <a class="score-back" href="/">Inicio</a>
    </header>

    <main class="score-app">
      <section class="score-board-head" aria-label="Resumo dos placares">
        <div>
          <p class="eyebrow">Central de placares da Copa 2026</p>
          <h1 id="scoreTitle">Placares da Copa 2026</h1>
        </div>
        <div class="score-stats">
          <span><strong id="matchCount">0</strong> partidas finalizadas</span>
          <span><strong id="groupCount">0</strong> grupos</span>
          <span><strong id="selectedLabel">Todos</strong></span>
        </div>
      </section>

      <section class="score-toolbar" aria-label="Filtros de placares">
        <div class="score-filter-tabs" id="scoreFilters">
          <button class="active" type="button" data-filter="all">Todos</button>
        </div>
        <label class="score-search">
          <span>Buscar</span>
          <input id="scoreSearch" type="search" placeholder="Selecao, grupo, cidade ou estadio" />
        </label>
      </section>

      <section class="score-layout">
        <section class="score-main-column">
          <section class="group-standings-panel" id="groupStandings" aria-live="polite"></section>
          <section class="score-card-grid" id="scoresGrid" aria-live="polite"></section>
        </section>
        <aside class="match-detail-panel" id="matchDetail" aria-live="polite"></aside>
      </section>
    </main>

    <script src="/scores.js?v=20260623-classificacao-grupo"></script>
  </body>
</html>
